<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Fractured Self: The Fall of Nader
    </title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- STORY SCREEN -->
    <main id="story-container">

        <!-- Background Scene -->
        <img
            id="scene-image"
            src="assets/images/intro/scene1.webp"
            alt="Scene Image"
        >

        <!-- Dark Overlay -->
        <div class="scene-overlay"></div>

        <!-- Dialogue UI -->
        <section id="dialogue-box">

            <!-- Speaker Name -->
            <h2 id="speaker-name"></h2>

            <!-- Story Text -->
            <p id="story-text">
                Loading story...
            </p>

            <!-- Continue Hint -->
            <span id="continue-indicator">
                Click anywhere to continue →
            </span>

        </section>

    </main>

    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
